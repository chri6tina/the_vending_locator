<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Vending Machine Body -->
  <rect x="4" y="2" width="24" height="28" rx="2" fill="#60a5fa" stroke="#3b82f6" stroke-width="1"/>
  
  <!-- Display Panel -->
  <rect x="6" y="4" width="20" height="18" rx="1" fill="white" opacity="0.9"/>
  
  <!-- Product Rows -->
  <rect x="8" y="6" width="16" height="3" fill="#e2e8f0"/>
  <rect x="8" y="10" width="16" height="3" fill="#e2e8f0"/>
  <rect x="8" y="14" width="16" height="3" fill="#e2e8f0"/>
  
  <!-- Coin Slot -->
  <rect x="22" y="6" width="2" height="4" fill="#64748b"/>
  
  <!-- Buttons -->
  <circle cx="24" cy="12" r="1" fill="#64748b"/>
  <circle cx="24" cy="16" r="1" fill="#64748b"/>
  
  <!-- Dispenser -->
  <rect x="12" y="24" width="8" height="4" rx="1" fill="white"/>
  
  <!-- Feet -->
  <rect x="6" y="28" width="4" height="2" rx="1" fill="#60a5fa"/>
  <rect x="22" y="28" width="4" height="2" rx="1" fill="#60a5fa"/>
</svg> 