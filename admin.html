<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - The Vending Locator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .admin-header {
            background: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
            border: 1px solid #f1f5f9;
        }
        
        .admin-header h1 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: #ffffff;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            color: #5a6c7d;
            font-size: 0.9rem;
        }
        
        .leads-section {
            background: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
        }
        
        .leads-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .export-btn {
            background: #60a5fa;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .export-btn:hover {
            background: #3b82f6;
            transform: translateY(-1px);
        }
        
        .leads-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        
        .leads-table th,
        .leads-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .leads-table th {
            background: #f8fafc;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .leads-table tr:hover {
            background: #f8fafc;
        }
        
        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .status-new {
            background: rgba(96, 165, 250, 0.1);
            color: #60a5fa;
        }
        
        .status-contacted {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        
        .action-btn {
            background: none;
            border: none;
            color: #60a5fa;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.3s ease;
        }
        
        .action-btn:hover {
            background: rgba(96, 165, 250, 0.1);
        }
        
        .search-bar {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        
        .search-bar:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
        }
        
        .no-leads {
            text-align: center;
            padding: 3rem;
            color: #5a6c7d;
        }
        
        .no-leads i {
            font-size: 3rem;
            color: #e2e8f0;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-chart-line"></i> Admin Dashboard</h1>
            <p>Manage your leads and track performance</p>
        </div>

        <div class="admin-stats">
            <div class="stat-card">
                <div class="stat-number" id="totalLeads">0</div>
                <div class="stat-label">Total Leads</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="newLeads">0</div>
                <div class="stat-label">New This Week</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="conversionRate">0%</div>
                <div class="stat-label">Conversion Rate</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="avgResponse">0h</div>
                <div class="stat-label">Avg Response Time</div>
            </div>
        </div>

        <div class="leads-section">
            <div class="leads-header">
                <h2>Lead Management</h2>
                <button class="export-btn" onclick="exportLeads()">
                    <i class="fas fa-download"></i> Export CSV
                </button>
            </div>

            <input type="text" class="search-bar" placeholder="Search leads by email, zip code, or status..." onkeyup="filterLeads(this.value)">

            <table class="leads-table" id="leadsTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Email</th>
                        <th>Zip Code</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="leadsTableBody">
                    <!-- Leads will be populated here -->
                </tbody>
            </table>

            <div class="no-leads" id="noLeads" style="display: none;">
                <i class="fas fa-inbox"></i>
                <h3>No leads yet</h3>
                <p>Leads will appear here once people start signing up</p>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
