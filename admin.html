<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - The Vending Locator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-16569722490">
    </script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'AW-16569722490');
    </script>
    
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #2563eb;
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
        
        .admin-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        
        .admin-section h2 {
            margin-bottom: 1.5rem;
            color: #1f2937;
        }
        
        .subscribers-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .subscriber-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .subscriber-info {
            flex: 1;
        }
        
        .subscriber-email {
            font-weight: 600;
            color: #1f2937;
        }
        
        .subscriber-details {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.25rem;
        }
        
        .campaign-form {
            display: grid;
            gap: 1rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #1f2937;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .form-group textarea {
            min-height: 200px;
            resize: vertical;
        }
        
        .btn-admin {
            background: #2563eb;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn-admin:hover {
            background: #1d4ed8;
        }
        
        .btn-danger {
            background: #dc2626;
        }
        
        .btn-danger:hover {
            background: #b91c1c;
        }
        
        .campaign-preview {
            background: #f9fafb;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }
        
        .preview-header {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .preview-content {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>The Vending Locator - Admin Dashboard</h1>
            <p>Manage your email subscribers and campaigns</p>
        </div>

        <!-- Stats Section -->
        <div class="admin-stats">
            <div class="stat-card">
                <div class="stat-number" id="totalSubscribers">0</div>
                <div class="stat-label">Total Subscribers</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="activeSubscribers">0</div>
                <div class="stat-label">Active Subscribers</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="newThisMonth">0</div>
                <div class="stat-label">New This Month</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="campaignsSent">0</div>
                <div class="stat-label">Campaigns Sent</div>
            </div>
        </div>

        <!-- Subscribers Section -->
        <div class="admin-section">
            <h2>Email Subscribers</h2>
            <div class="subscribers-list" id="subscribersList">
                <p>Loading subscribers...</p>
            </div>
        </div>

        <!-- Campaign Section -->
        <div class="admin-section">
            <h2>Send Email Campaign</h2>
            <form class="campaign-form" id="campaignForm">
                <div class="form-group">
                    <label for="campaignSubject">Subject Line</label>
                    <input type="text" id="campaignSubject" required placeholder="Enter campaign subject">
                </div>
                
                <div class="form-group">
                    <label for="targetAudience">Target Audience</label>
                    <select id="targetAudience" required>
                        <option value="all">All Subscribers</option>
                        <option value="new">New Subscribers (Last 30 days)</option>
                        <option value="active">Active Subscribers Only</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="campaignContent">Email Content (HTML)</label>
                    <textarea id="campaignContent" required placeholder="Enter your email content in HTML format">
<div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
    <h2 style="color: #2563eb;">Your Campaign Title</h2>
    <p>Your email content goes here...</p>
    
    <h3>Key Points:</h3>
    <ul>
        <li>Point 1</li>
        <li>Point 2</li>
        <li>Point 3</li>
    </ul>
    
    <p>Best regards,<br>The Vending Locator Team</p>
</div>
                    </textarea>
                </div>
                
                <div class="campaign-preview">
                    <div class="preview-header">Preview:</div>
                    <div class="preview-content" id="campaignPreview"></div>
                </div>
                
                <button type="submit" class="btn-admin">Send Campaign</button>
            </form>
        </div>
    </div>

    <script>
        // Load subscribers on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadSubscribers();
            updateStats();
            
            // Campaign form handling
            const campaignForm = document.getElementById('campaignForm');
            const campaignContent = document.getElementById('campaignContent');
            const campaignPreview = document.getElementById('campaignPreview');
            
            // Update preview as user types
            campaignContent.addEventListener('input', function() {
                campaignPreview.innerHTML = this.value;
            });
            
            campaignForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const subject = document.getElementById('campaignSubject').value;
                const content = document.getElementById('campaignContent').value;
                const targetAudience = document.getElementById('targetAudience').value;
                
                if (confirm('Are you sure you want to send this campaign to all subscribers?')) {
                    try {
                        const response = await fetch('/.netlify/functions/send-campaign', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                subject: subject,
                                htmlContent: content,
                                targetAudience: targetAudience
                            })
                        });

                        const result = await response.json();
                        
                        if (result.success) {
                            alert(`Campaign sent successfully! Sent to ${result.stats.successful} subscribers.`);
                            campaignForm.reset();
                        } else {
                            alert('Failed to send campaign. Please try again.');
                        }
                    } catch (error) {
                        console.error('Campaign error:', error);
                        alert('Failed to send campaign. Please try again.');
                    }
                }
            });
        });

        async function loadSubscribers() {
            // This would typically fetch from your database
            // For now, we'll use localStorage as a demo
            const leads = JSON.parse(localStorage.getItem('vendingLeads') || '[]');
            const subscribersList = document.getElementById('subscribersList');
            
            if (leads.length === 0) {
                subscribersList.innerHTML = '<p>No subscribers found.</p>';
                return;
            }
            
            subscribersList.innerHTML = leads.map(lead => `
                <div class="subscriber-item">
                    <div class="subscriber-info">
                        <div class="subscriber-email">${lead.email}</div>
                        <div class="subscriber-details">
                            Zip: ${lead.zipcode} | Joined: ${new Date(lead.date).toLocaleDateString()} | Status: ${lead.status}
                        </div>
                    </div>
                    <button class="btn-admin btn-danger" onclick="unsubscribe('${lead.email}')">Unsubscribe</button>
                </div>
            `).join('');
        }

        async function unsubscribe(email) {
            if (confirm(`Are you sure you want to unsubscribe ${email}?`)) {
                try {
                    const response = await fetch('/.netlify/functions/unsubscribe', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ email: email })
                    });

                    const result = await response.json();
                    
                    if (result.success) {
                        alert('Successfully unsubscribed!');
                        loadSubscribers();
                        updateStats();
                    } else {
                        alert('Failed to unsubscribe. Please try again.');
                    }
                } catch (error) {
                    console.error('Unsubscribe error:', error);
                    alert('Failed to unsubscribe. Please try again.');
                }
            }
        }

        function updateStats() {
            const leads = JSON.parse(localStorage.getItem('vendingLeads') || '[]');
            const activeLeads = leads.filter(lead => lead.status === 'new');
            const thisMonth = new Date().getMonth();
            const newThisMonth = leads.filter(lead => new Date(lead.date).getMonth() === thisMonth);
            
            document.getElementById('totalSubscribers').textContent = leads.length;
            document.getElementById('activeSubscribers').textContent = activeLeads.length;
            document.getElementById('newThisMonth').textContent = newThisMonth.length;
            document.getElementById('campaignsSent').textContent = '0'; // This would come from your database
        }
    </script>
</body>
</html>
