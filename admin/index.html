<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - The Vending Locator</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            background: #ffffff;
            color: #1e293b;
            padding: 2rem 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid #e2e8f0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 0 2rem 2rem;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 2rem;
        }

        .sidebar-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: bold;
            color: #f97316;
        }

        .sidebar-nav {
            padding: 0 1rem;
        }

        .nav-section {
            margin-bottom: 2rem;
        }

        .nav-section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #64748b;
            font-weight: 600;
            padding: 0 1rem;
            margin-bottom: 0.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            color: #1e293b;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 0.25rem;
            transition: all 0.3s ease;
            background: transparent;
        }

        .nav-item:hover {
            background: #f97316;
            color: white;
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }

        .nav-item.active {
            background: #f97316;
            color: white;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }

        .nav-icon {
            width: 20px;
            margin-right: 0.75rem;
            text-align: center;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
            background: #f8fafc;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #1e293b;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: #f97316;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        /* Section Content */
        .section-content {
            display: none;
        }

        .section-content.active {
            display: block;
        }

        /* Directory Section - The Beautiful Dashboard */
        .directory-section {
            background: transparent;
        }

        .directory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .directory-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #1e293b;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .btn-primary {
            background: #f97316;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-primary:hover {
            background: #ea580c;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        }

        /* Beautiful Vending Services Cards */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .service-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #f97316, #ea580c);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .service-card:hover::before {
            opacity: 1;
        }

        .service-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .service-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .service-location {
            font-size: 0.875rem;
            color: #64748b;
        }

        .status-badge {
            background: #10b981;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .location-badge {
            background: #0ea5e9;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 0.5rem;
            display: inline-block;
        }

        .service-details {
            margin: 1rem 0;
        }

        .service-detail {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: #64748b;
        }

        .service-detail i {
            color: #f97316;
            width: 16px;
        }

        .service-detail strong {
            color: #1e293b;
        }

        .service-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            text-decoration: none;
        }

        .btn-edit {
            border-color: #10b981;
            color: #10b981;
        }

        .btn-edit:hover {
            background: #10b981;
            color: white;
        }

        .btn-view {
            border-color: #0ea5e9;
            color: #0ea5e9;
        }

        .btn-view:hover {
            background: #0ea5e9;
            color: white;
        }

        .btn-create {
            border-color: #8b5cf6;
            color: #8b5cf6;
        }

        .btn-create:hover {
            background: #8b5cf6;
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .services-grid {
                grid-template-columns: 1fr;
            }

            .directory-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #64748b;
        }

        .empty-state i {
            font-size: 3rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-chart-line"></i> Admin
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">Main</div>
                    <a href="#analytics" class="nav-item" onclick="showSection('analytics')">
                        <i class="fas fa-chart-bar nav-icon"></i>
                        Analytics
                    </a>
                    <a href="#directory" class="nav-item active" onclick="showSection('directory')">
                        <i class="fas fa-map-marker-alt nav-icon"></i>
                        Directory
                    </a>
                    <a href="#hot-leads" class="nav-item" onclick="showSection('hot-leads')">
                        <i class="fas fa-fire nav-icon"></i>
                        Hot Leads
                    </a>
                    <a href="#emails" class="nav-item" onclick="showSection('emails')">
                        <i class="fas fa-envelope nav-icon"></i>
                        Emails
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <h1 class="page-title">Dashboard</h1>
                <div class="user-menu">
                    <span>Admin User</span>
                    <div class="user-avatar">A</div>
                </div>
            </header>

            <!-- Directory Section - The Beautiful Dashboard -->
            <div id="directory" class="section-content active">
                <div class="directory-section">
                    <div class="directory-header">
                        <h2 class="directory-title">Vending Services Directory</h2>
                        <div class="header-actions">
                            <button class="btn-primary" onclick="showAddVendorModal()">
                                <i class="fas fa-store"></i> Add New Vendor
                            </button>
                            <button class="btn-primary" onclick="showAddLocationModal()">
                                <i class="fas fa-plus"></i> Add New Location
                            </button>
                        </div>
                    </div>

                    <div class="services-grid" id="servicesGrid">
                        <!-- Vending Services Cards will be populated here -->
                    </div>
                </div>
            </div>

            <!-- Analytics Section -->
            <div id="analytics" class="section-content">
                <h2>Analytics Dashboard</h2>
                <p>Analytics content will go here.</p>
            </div>

            <!-- Hot Leads Section -->
            <div id="hot-leads" class="section-content">
                <h2>Hot Leads</h2>
                <p>Hot leads content will go here.</p>
            </div>

            <!-- Emails Section -->
            <div id="emails" class="section-content">
                <h2>Email Management</h2>
                <p>Email management content will go here.</p>
            </div>
        </main>
    </div>

    <!-- Add Location Modal -->
    <div id="addLocationModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Location</h3>
                <span class="close" onclick="closeModal('addLocationModal')">&times;</span>
            </div>
            <form id="addLocationForm">
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" required>
                </div>
                <div class="form-group">
                    <label for="state">State</label>
                    <input type="text" id="state" name="state" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal('addLocationModal')">Cancel</button>
                    <button type="submit" class="btn-primary">Add Location</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Vendor Modal -->
    <div id="addVendorModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Vendor</h3>
                <span class="close" onclick="closeModal('addVendorModal')">&times;</span>
            </div>
            <form id="addVendorForm">
                <div class="form-group">
                    <label for="vendorName">Vendor Name</label>
                    <input type="text" id="vendorName" name="vendorName" required>
                </div>
                <div class="form-group">
                    <label for="vendorEmail">Email</label>
                    <input type="email" id="vendorEmail" name="vendorEmail">
                </div>
                <div class="form-group">
                    <label for="vendorPhone">Phone</label>
                    <input type="tel" id="vendorPhone" name="vendorPhone">
                </div>
                <div class="form-group">
                    <label for="vendorCity">City</label>
                    <input type="text" id="vendorCity" name="vendorCity">
                </div>
                <div class="form-group">
                    <label for="vendorState">State</label>
                    <input type="text" id="vendorState" name="vendorState">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal('addVendorModal')">Cancel</button>
                    <button type="submit" class="btn-primary">Add Vendor</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Sample data for the beautiful dashboard
        const sampleLocations = [
            {
                id: 1,
                name: 'Vending Services Orlando',
                city: 'Orlando',
                state: 'FL',
                slug: 'orlando-fl',
                description: 'Professional vending services in Orlando, FL. We provide reliable snack vending, beverage vending, and coffee service throughout the Orlando area.',
                status: 'ACTIVE',
                email: '',
                phone: '',
                created_at: '2024-01-15T10:00:00Z'
            },
            {
                id: 2,
                name: 'Vending Services Houston',
                city: 'Houston',
                state: 'TX',
                slug: 'houston-tx',
                description: 'Professional vending services in Houston, TX. We provide reliable snack vending, beverage vending, and coffee service throughout the Houston area.',
                status: 'ACTIVE',
                email: '',
                phone: '',
                created_at: '2024-01-15T10:00:00Z'
            },
            {
                id: 3,
                name: 'Vending Services New York',
                city: 'New York',
                state: 'NY',
                slug: 'new-york-ny',
                description: 'Professional vending services in New York, NY. We provide reliable snack vending, beverage vending, and coffee service throughout the New York area.',
                status: 'ACTIVE',
                email: 'info@vendingny.com',
                phone: '',
                created_at: '2024-01-15T10:00:00Z'
            },
            {
                id: 4,
                name: 'Vending Services Miami',
                city: 'Miami',
                state: 'FL',
                slug: 'miami-fl',
                description: 'Professional vending services in Miami, FL. We provide reliable snack vending, beverage vending, and coffee service throughout the Miami area.',
                status: 'ACTIVE',
                email: '',
                phone: '',
                created_at: '2024-01-15T10:00:00Z'
            },
            {
                id: 5,
                name: 'Vending Services Los Angeles',
                city: 'Los Angeles',
                state: 'CA',
                slug: 'los-angeles-ca',
                description: 'Professional vending services in Los Angeles, CA. We provide reliable snack vending, beverage vending, and coffee service throughout the Los Angeles area.',
                status: 'ACTIVE',
                email: '',
                phone: '',
                created_at: '2024-01-15T10:00:00Z'
            },
            {
                id: 6,
                name: 'Vending Services Chicago',
                city: 'Chicago',
                state: 'IL',
                slug: 'chicago-il',
                description: 'Professional vending services in Chicago, IL. We provide reliable snack vending, beverage vending, and coffee service throughout the Chicago area.',
                status: 'ACTIVE',
                email: '',
                phone: '',
                created_at: '2024-01-15T10:00:00Z'
            }
        ];

        // Initialize the dashboard
        document.addEventListener('DOMContentLoaded', function() {
            loadLocations();
        });

        // Load locations from localStorage or use sample data
        function loadLocations() {
            const storedLocations = JSON.parse(localStorage.getItem('locations') || '[]');
            const locations = storedLocations.length > 0 ? storedLocations : sampleLocations;
            renderServiceCards(locations);
        }

        // Render the beautiful service cards
        function renderServiceCards(locations) {
            const servicesGrid = document.getElementById('servicesGrid');
            
            if (locations.length === 0) {
                servicesGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-map-marker-alt"></i>
                        <h3>No locations yet</h3>
                        <p>Add your first location to get started</p>
                        <button class="btn-primary" onclick="showAddLocationModal()">
                            <i class="fas fa-plus"></i> Add First Location
                        </button>
                    </div>
                `;
                return;
            }

            servicesGrid.innerHTML = locations.map(location => `
                <div class="service-card">
                    <div class="service-header">
                        <div>
                            <h3 class="service-title">${location.name}</h3>
                            <div class="service-location">${location.city}, ${location.state}</div>
                        </div>
                        <span class="status-badge">${location.status}</span>
                    </div>
                    
                    <div class="location-badge">${location.city.toUpperCase()}, ${location.state}</div>
                    
                    <div class="service-details">
                        <div class="service-detail">
                            <i class="fas fa-map-marker-alt"></i>
                            <span><strong>Location:</strong> ${location.city}, ${location.state}</span>
                        </div>
                        <div class="service-detail">
                            <i class="fas fa-link"></i>
                            <span><strong>Slug:</strong> ${location.slug}</span>
                        </div>
                        <div class="service-detail">
                            <i class="fas fa-info-circle"></i>
                            <span><strong>Description:</strong> ${location.description.substring(0, 120)}${location.description.length > 120 ? '...' : ''}</span>
                        </div>
                        ${location.email ? `<div class="service-detail">
                            <i class="fas fa-envelope"></i>
                            <span><strong>Email:</strong> ${location.email}</span>
                        </div>` : ''}
                    </div>
                    
                    <div class="service-actions">
                        <button class="btn-secondary btn-edit" onclick="editLocation(${location.id})">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="btn-secondary btn-view" onclick="viewLocation(${location.id})">
                            <i class="fas fa-eye"></i> View
                        </button>
                        <button class="btn-secondary btn-create" onclick="createLocationPage(${location.id})">
                            <i class="fas fa-file"></i> Create Page
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Section navigation
        function showSection(sectionId) {
            // Hide all sections
            const sections = document.querySelectorAll('.section-content');
            sections.forEach(section => {
                section.classList.remove('active');
            });

            // Show selected section
            const selectedSection = document.getElementById(sectionId);
            if (selectedSection) {
                selectedSection.classList.add('active');
            }

            // Update active nav item
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                item.classList.remove('active');
            });

            const clickedNavItem = document.querySelector(`[onclick*="showSection('${sectionId}')"]`);
            if (clickedNavItem) {
                clickedNavItem.classList.add('active');
            }
        }

        // Modal functions
        function showAddLocationModal() {
            document.getElementById('addLocationModal').style.display = 'block';
        }

        function showAddVendorModal() {
            document.getElementById('addVendorModal').style.display = 'block';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modals = document.querySelectorAll('.modal');
            modals.forEach(modal => {
                if (event.target === modal) {
                    modal.style.display = 'none';
                }
            });
        }

        // Action functions
        function editLocation(id) {
            alert(`Edit location ${id}`);
        }

        function viewLocation(id) {
            alert(`View location ${id}`);
        }

        function createLocationPage(id) {
            alert(`Create page for location ${id}`);
        }

        // Handle form submission
        document.getElementById('addLocationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const newLocation = {
                id: Date.now(),
                name: `Vending Services ${formData.get('city')}`,
                city: formData.get('city'),
                state: formData.get('state'),
                slug: `${formData.get('city').toLowerCase().replace(/\s+/g, '-')}-${formData.get('state').toLowerCase()}`,
                description: `Professional vending services in ${formData.get('city')}, ${formData.get('state')}. We provide reliable snack vending, beverage vending, and coffee service throughout the ${formData.get('city')} area.`,
                status: 'ACTIVE',
                email: '',
                phone: '',
                created_at: new Date().toISOString()
            };

            // Save to localStorage
            const storedLocations = JSON.parse(localStorage.getItem('locations') || '[]');
            storedLocations.push(newLocation);
            localStorage.setItem('locations', JSON.stringify(storedLocations));

            // Reload the dashboard
            loadLocations();
            closeModal('addLocationModal');
            this.reset();
        });

        // Handle vendor form submission
        document.getElementById('addVendorForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const newVendor = {
                id: Date.now(),
                name: formData.get('vendorName'),
                email: formData.get('vendorEmail'),
                phone: formData.get('vendorPhone'),
                city: formData.get('vendorCity'),
                state: formData.get('vendorState'),
                status: 'ACTIVE',
                created_at: new Date().toISOString()
            };

            // Save to localStorage
            const storedVendors = JSON.parse(localStorage.getItem('vendors') || '[]');
            storedVendors.push(newVendor);
            localStorage.setItem('vendors', JSON.stringify(storedVendors));

            // Show success message
            alert('Vendor added successfully!');
            closeModal('addVendorModal');
            this.reset();
        });
    </script>
</body>
</html>
