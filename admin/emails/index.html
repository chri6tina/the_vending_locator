<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Management - Admin Dashboard</title>
    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .back-link {
            color: #00C5F5;
            text-decoration: none;
            font-weight: 600;
        }
        
        .back-link:hover {
            color: #0088E8;
        }
        
        .email-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00C5F5;
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
        
        .email-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        
        .email-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1f2937;
        }
        
        .section-icon {
            font-size: 2rem;
            color: #00C5F5;
        }
        
        .subscribers-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .subscriber-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .subscriber-item:last-child {
            border-bottom: none;
        }
        
        .subscriber-info {
            flex: 1;
        }
        
        .subscriber-email {
            font-weight: 600;
            color: #1f2937;
        }
        
        .subscriber-details {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.25rem;
        }
        
        .campaign-form {
            display: grid;
            gap: 1rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #1f2937;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .form-group textarea {
            min-height: 200px;
            resize: vertical;
        }
        
        .btn-primary {
            background: #00C5F5;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn-primary:hover {
            background: #0088E8;
        }
        
        .btn-danger {
            background: #dc2626;
        }
        
        .btn-danger:hover {
            background: #b91c1c;
        }
        
        .campaign-preview {
            background: #f9fafb;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }
        
        .preview-header {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .preview-content {
            color: #666;
        }
        
        .quick-actions {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .btn-secondary {
            background: #6b7280;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-secondary:hover {
            background: #4b5563;
        }
        
        @media (max-width: 768px) {
            .email-sections {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div>
                <h1><i class="fas fa-envelope"></i> Email Management</h1>
                <p>Manage your email subscribers and campaigns</p>
            </div>
            <a href="../" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <!-- Email Stats -->
        <div class="email-stats">
            <div class="stat-card">
                <div class="stat-number" id="totalSubscribers">0</div>
                <div class="stat-label">Total Subscribers</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="activeSubscribers">0</div>
                <div class="stat-label">Active Subscribers</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="newThisMonth">0</div>
                <div class="stat-label">New This Month</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="campaignsSent">0</div>
                <div class="stat-label">Campaigns Sent</div>
            </div>
        </div>

        <!-- Email Sections -->
        <div class="email-sections">
            <!-- Subscribers Section -->
            <div class="email-section">
                <div class="section-header">
                    <div class="section-title">Email Subscribers</div>
                    <div class="section-icon">
                        <i class="fas fa-users"></i>
                    </div>
                </div>
                
                <div class="subscribers-list" id="subscribersList">
                    <p>Loading subscribers...</p>
                </div>
                
                <div class="quick-actions">
                    <a href="subscribers/" class="btn-secondary">
                        <i class="fas fa-list"></i> View All Subscribers
                    </a>
                    <a href="subscribers/export.html" class="btn-secondary">
                        <i class="fas fa-download"></i> Export List
                    </a>
                </div>
            </div>

            <!-- Campaign Section -->
            <div class="email-section">
                <div class="section-header">
                    <div class="section-title">Send Email Campaign</div>
                    <div class="section-icon">
                        <i class="fas fa-paper-plane"></i>
                    </div>
                </div>
                
                <form class="campaign-form" id="campaignForm">
                    <div class="form-group">
                        <label for="campaignSubject">Subject Line</label>
                        <input type="text" id="campaignSubject" required placeholder="Enter campaign subject">
                    </div>
                    
                    <div class="form-group">
                        <label for="targetAudience">Target Audience</label>
                        <select id="targetAudience" required>
                            <option value="all">All Subscribers</option>
                            <option value="new">New Subscribers (Last 30 days)</option>
                            <option value="active">Active Subscribers Only</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="campaignContent">Email Content (HTML)</label>
                        <textarea id="campaignContent" required placeholder="Enter your email content in HTML format">
<div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
    <h2 style="color: #00C5F5;">Your Campaign Title</h2>
    <p>Your email content goes here...</p>
    
    <h3>Key Points:</h3>
    <ul>
        <li>Point 1</li>
        <li>Point 2</li>
        <li>Point 3</li>
    </ul>
    
    <p>Best regards,<br>The Vending Locator Team</p>
</div>
                        </textarea>
                    </div>
                    
                    <div class="campaign-preview">
                        <div class="preview-header">Preview:</div>
                        <div class="preview-content" id="campaignPreview"></div>
                    </div>
                    
                    <button type="submit" class="btn-primary">Send Campaign</button>
                </form>
                
                <div class="quick-actions">
                    <a href="campaigns/" class="btn-secondary">
                        <i class="fas fa-list"></i> View Campaigns
                    </a>
                    <a href="campaigns/create.html" class="btn-secondary">
                        <i class="fas fa-plus"></i> Create Campaign
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadSubscribers();
            updateStats();
            
            // Campaign form handling
            const campaignForm = document.getElementById('campaignForm');
            const campaignContent = document.getElementById('campaignContent');
            const campaignPreview = document.getElementById('campaignPreview');
            
            // Update preview as user types
            campaignContent.addEventListener('input', function() {
                campaignPreview.innerHTML = this.value;
            });
            
            campaignForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const subject = document.getElementById('campaignSubject').value;
                const content = document.getElementById('campaignContent').value;
                const targetAudience = document.getElementById('targetAudience').value;
                
                if (confirm('Are you sure you want to send this campaign to all subscribers?')) {
                    try {
                        const response = await fetch('/.netlify/functions/send-campaign', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                subject: subject,
                                htmlContent: content,
                                targetAudience: targetAudience
                            })
                        });

                        const result = await response.json();
                        
                        if (result.success) {
                            alert(`Campaign sent successfully! Sent to ${result.stats.successful} subscribers.`);
                            campaignForm.reset();
                        } else {
                            alert('Failed to send campaign. Please try again.');
                        }
                    } catch (error) {
                        console.error('Campaign error:', error);
                        alert('Failed to send campaign. Please try again.');
                    }
                }
            });
        });

        async function loadSubscribers() {
            // This would typically fetch from your database
            // For now, we'll use localStorage as a demo
            const leads = JSON.parse(localStorage.getItem('vendingLeads') || '[]');
            const subscribersList = document.getElementById('subscribersList');
            
            if (leads.length === 0) {
                subscribersList.innerHTML = '<p>No subscribers found.</p>';
                return;
            }
            
            subscribersList.innerHTML = leads.map(lead => `
                <div class="subscriber-item">
                    <div class="subscriber-info">
                        <div class="subscriber-email">${lead.email}</div>
                        <div class="subscriber-details">
                            Zip: ${lead.zipcode} | Joined: ${new Date(lead.date).toLocaleDateString()} | Status: ${lead.status}
                        </div>
                    </div>
                    <button class="btn-primary btn-danger" onclick="unsubscribe('${lead.email}')">Unsubscribe</button>
                </div>
            `).join('');
        }

        async function unsubscribe(email) {
            if (confirm(`Are you sure you want to unsubscribe ${email}?`)) {
                try {
                    const response = await fetch('/.netlify/functions/unsubscribe', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ email: email })
                    });

                    const result = await response.json();
                    
                    if (result.success) {
                        alert('Successfully unsubscribed!');
                        loadSubscribers();
                        updateStats();
                    } else {
                        alert('Failed to unsubscribe. Please try again.');
                    }
                } catch (error) {
                    console.error('Unsubscribe error:', error);
                    alert('Failed to unsubscribe. Please try again.');
                }
            }
        }

        function updateStats() {
            const leads = JSON.parse(localStorage.getItem('vendingLeads') || '[]');
            const activeLeads = leads.filter(lead => lead.status === 'new');
            const thisMonth = new Date().getMonth();
            const newThisMonth = leads.filter(lead => new Date(lead.date).getMonth() === thisMonth);
            
            document.getElementById('totalSubscribers').textContent = leads.length;
            document.getElementById('activeSubscribers').textContent = activeLeads.length;
            document.getElementById('newThisMonth').textContent = newThisMonth.length;
            document.getElementById('campaignsSent').textContent = '0'; // This would come from your database
        }
    </script>
</body>
</html>
