<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Management - Admin Dashboard</title>
    <link rel="stylesheet" href="../../../styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .back-link {
            color: #00C5F5;
            text-decoration: none;
            font-weight: 600;
        }
        
        .back-link:hover {
            color: #0088E8;
        }
        
        .vendor-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00C5F5;
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
        
        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .search-box {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .search-input {
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            min-width: 300px;
        }
        
        .btn-primary {
            background: #00C5F5;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary:hover {
            background: #0088E8;
        }
        
        .btn-secondary {
            background: #6b7280;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-secondary:hover {
            background: #4b5563;
        }
        
        .btn-danger {
            background: #dc2626;
        }
        
        .btn-danger:hover {
            background: #b91c1c;
        }
        
        .vendors-table {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .table-header {
            background: #f9fafb;
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .table-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr auto;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
            align-items: center;
        }
        
        .table-row:last-child {
            border-bottom: none;
        }
        
        .table-row:hover {
            background: #f9fafb;
        }
        
        .table-header .table-row {
            font-weight: bold;
            color: #374151;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .vendor-name {
            font-weight: 600;
            color: #1f2937;
        }
        
        .vendor-category {
            color: #00C5F5;
            font-weight: 600;
        }
        
        .vendor-location {
            color: #666;
        }
        
        .vendor-years {
            color: #00C5F5;
            font-weight: 600;
        }
        
        .vendor-reviews {
            color: #666;
        }
        
        .vendor-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
        }
        
        .status-active {
            background: #dcfce7;
            color: #166534;
        }
        
        .status-inactive {
            background: #fef2f2;
            color: #dc2626;
        }
        
        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }
        
        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }
        
        .page-btn {
            background: #f3f4f6;
            color: #374151;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .page-btn.active {
            background: #00C5F5;
            color: white;
        }
        
        .page-btn:hover {
            background: #00C5F5;
            color: white;
        }
        
        @media (max-width: 768px) {
            .table-row {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
            
            .table-header .table-row {
                display: none;
            }
            
            .vendor-name {
                font-size: 1.1rem;
            }
            
            .action-buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div>
                <h1><i class="fas fa-store"></i> Vendor Management</h1>
                <p>Manage your vending machine vendors</p>
            </div>
            <a href="../" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Directory
            </a>
        </div>

        <!-- Vendor Stats -->
        <div class="vendor-stats">
            <div class="stat-card">
                <div class="stat-number" id="totalVendors">0</div>
                <div class="stat-label">Total Vendors</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="activeVendors">0</div>
                <div class="stat-label">Active Vendors</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingVendors">0</div>
                <div class="stat-label">Pending Approval</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="newThisMonth">0</div>
                <div class="stat-label">New This Month</div>
            </div>
        </div>

        <!-- Actions Bar -->
        <div class="actions-bar">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="Search vendors...">
                <button class="btn-secondary" onclick="searchVendors()">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
            <a href="add.html" class="btn-primary">
                <i class="fas fa-plus"></i> Add New Vendor
            </a>
        </div>

        <!-- Vendors Table -->
        <div class="vendors-table">
            <div class="table-header">
                <div class="table-row">
                    <div>Company Name</div>
                    <div>Location</div>
                    <div>Years</div>
                    <div>Reviews</div>
                    <div>Status</div>
                    <div>Added Date</div>
                    <div>Actions</div>
                </div>
            </div>
            <div id="vendorsTableBody">
                <!-- Vendors will be loaded here -->
            </div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination">
            <!-- Pagination will be generated here -->
        </div>
    </div>

    <script>
        let allVendors = [];
        let filteredVendors = [];
        let currentPage = 1;
        const vendorsPerPage = 10;

        document.addEventListener('DOMContentLoaded', function() {
            loadVendors();
            setupEventListeners();
        });

        function setupEventListeners() {
            // Search input
            document.getElementById('searchInput').addEventListener('input', function() {
                searchVendors();
            });
        }

        function loadVendors() {
            const vendors = JSON.parse(localStorage.getItem('vendingVendors') || '[]');
            
            if (vendors.length === 0) {
                // Add sample data if none exists
                const sampleVendors = [
                    {
                        id: 1,
                        companyName: "SnackMaster Vending",
                        description: "Premium snack vending machines with healthy options. We specialize in providing high-quality snacks and beverages to offices, schools, and public spaces.",
                        yearsInBusiness: 8,
                        reviewCount: 156,
                        phoneNumber: "(555) 123-4567",
                        city: "New York",
                        state: "NY",
                        serviceFocus: ["snacks", "beverages", "healthy"],
                        status: "active",
                        addedDate: "2024-01-15"
                    },
                    {
                        id: 2,
                        companyName: "Beverage Express",
                        description: "Cold beverages and energy drinks for all your refreshment needs. We offer a wide selection of sodas, juices, and energy drinks.",
                        yearsInBusiness: 12,
                        reviewCount: 89,
                        phoneNumber: "(555) 234-5678",
                        city: "Los Angeles",
                        state: "CA",
                        serviceFocus: ["beverages", "coffee"],
                        status: "active",
                        addedDate: "2024-01-20"
                    },
                    {
                        id: 3,
                        companyName: "Healthy Bites",
                        description: "Organic and healthy vending options for health-conscious consumers. We focus on nutritious snacks and fresh food alternatives.",
                        yearsInBusiness: 5,
                        reviewCount: 203,
                        phoneNumber: "(555) 345-6789",
                        city: "Chicago",
                        state: "IL",
                        serviceFocus: ["healthy", "fresh", "snacks"],
                        status: "pending",
                        addedDate: "2024-02-01"
                    }
                ];
                
                localStorage.setItem('vendingVendors', JSON.stringify(sampleVendors));
                allVendors = sampleVendors;
            } else {
                allVendors = vendors;
            }
            
            filteredVendors = [...allVendors];
            updateStats();
            displayVendors();
        }

        function searchVendors() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            
            filteredVendors = allVendors.filter(vendor => 
                (vendor.companyName || vendor.name).toLowerCase().includes(searchQuery) ||
                (vendor.city && vendor.city.toLowerCase().includes(searchQuery)) ||
                (vendor.state && vendor.state.toLowerCase().includes(searchQuery)) ||
                (vendor.location && vendor.location.toLowerCase().includes(searchQuery)) ||
                (vendor.description && vendor.description.toLowerCase().includes(searchQuery)) ||
                (vendor.phoneNumber && vendor.phoneNumber.toLowerCase().includes(searchQuery))
            );
            
            currentPage = 1;
            displayVendors();
        }

        function displayVendors() {
            const tableBody = document.getElementById('vendorsTableBody');
            const startIndex = (currentPage - 1) * vendorsPerPage;
            const endIndex = startIndex + vendorsPerPage;
            const vendorsToShow = filteredVendors.slice(startIndex, endIndex);
            
            if (vendorsToShow.length === 0) {
                tableBody.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search" style="font-size: 3rem; color: #ccc; margin-bottom: 1rem;"></i>
                        <h3>No vendors found</h3>
                        <p>Try adjusting your search criteria or add a new vendor</p>
                    </div>
                `;
            } else {
                tableBody.innerHTML = vendorsToShow.map(vendor => `
                    <div class="table-row">
                        <div class="vendor-name">${vendor.companyName || vendor.name}</div>
                        <div class="vendor-location">${vendor.city && vendor.state ? `${vendor.city}, ${vendor.state}` : vendor.location}</div>
                        <div class="vendor-years">${vendor.yearsInBusiness ? `${vendor.yearsInBusiness} years` : 'N/A'}</div>
                        <div class="vendor-reviews">${vendor.reviewCount ? `${vendor.reviewCount} reviews` : 'N/A'}</div>
                        <div class="vendor-status status-${vendor.status}">${vendor.status.charAt(0).toUpperCase() + vendor.status.slice(1)}</div>
                        <div>${new Date(vendor.addedDate).toLocaleDateString()}</div>
                        <div class="action-buttons">
                            <a href="edit.html?id=${vendor.id}" class="btn-secondary">
                                <i class="fas fa-edit"></i> Edit
                            </a>
                            <button class="btn-secondary btn-danger" onclick="deleteVendor(${vendor.id})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `).join('');
            }
            
            displayPagination();
        }

        function displayPagination() {
            const totalPages = Math.ceil(filteredVendors.length / vendorsPerPage);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let paginationHTML = '';
            
            // Previous button
            if (currentPage > 1) {
                paginationHTML += `<button class="page-btn" onclick="goToPage(${currentPage - 1})">Previous</button>`;
            }
            
            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    paginationHTML += `<button class="page-btn active">${i}</button>`;
                } else {
                    paginationHTML += `<button class="page-btn" onclick="goToPage(${i})">${i}</button>`;
                }
            }
            
            // Next button
            if (currentPage < totalPages) {
                paginationHTML += `<button class="page-btn" onclick="goToPage(${currentPage + 1})">Next</button>`;
            }
            
            pagination.innerHTML = paginationHTML;
        }

        function goToPage(page) {
            currentPage = page;
            displayVendors();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateStats() {
            const activeVendors = allVendors.filter(vendor => vendor.status === 'active');
            const pendingVendors = allVendors.filter(vendor => vendor.status === 'pending');
            const thisMonth = new Date().getMonth();
            const newThisMonth = allVendors.filter(vendor => new Date(vendor.addedDate).getMonth() === thisMonth);
            
            document.getElementById('totalVendors').textContent = allVendors.length;
            document.getElementById('activeVendors').textContent = activeVendors.length;
            document.getElementById('pendingVendors').textContent = pendingVendors.length;
            document.getElementById('newThisMonth').textContent = newThisMonth.length;
        }

        function deleteVendor(vendorId) {
            if (confirm('Are you sure you want to delete this vendor? This action cannot be undone.')) {
                allVendors = allVendors.filter(vendor => vendor.id !== vendorId);
                localStorage.setItem('vendingVendors', JSON.stringify(allVendors));
                
                // Update filtered vendors
                const searchQuery = document.getElementById('searchInput').value.toLowerCase();
                filteredVendors = allVendors.filter(vendor => 
                    vendor.name.toLowerCase().includes(searchQuery) ||
                    vendor.category.toLowerCase().includes(searchQuery) ||
                    vendor.location.toLowerCase().includes(searchQuery) ||
                    vendor.description.toLowerCase().includes(searchQuery)
                );
                
                updateStats();
                displayVendors();
                
                alert('Vendor deleted successfully!');
            }
        }
    </script>
</body>
</html>
