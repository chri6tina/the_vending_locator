        .search-section {

<body>
    <div class="directory-container">
        <div class="directory-header">
            <h1><i class="fas fa-store"></i> Vending Machine Directory</h1>
            <p>Find vending machines near you with our comprehensive directory</p>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <form class="search-form" id="searchForm">
                <div class="form-group">
                    <label for="searchQuery">Search Vendors</label>
                    <input type="text" id="searchQuery" placeholder="Enter vendor name or keywords">
                </div>
                
                <div class="form-group">
                    <label for="locationFilter">Location</label>
                    <select id="locationFilter">
                        <option value="">All Locations</option>
                        <option value="new-york">New York</option>
                        <option value="los-angeles">Los Angeles</option>
                        <option value="chicago">Chicago</option>
                        <option value="houston">Houston</option>
                        <option value="phoenix">Phoenix</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-search">
                    <i class="fas fa-search"></i> Search
                </button>
            </form>
        </div>

        <!-- Filters -->
        <div class="filters-section" id="categoryFilters">
            <button class="filter-btn active" data-category="all">All Categories</button>
            <button class="filter-btn" data-category="snacks">Snacks</button>
            <button class="filter-btn" data-category="beverages">Beverages</button>
            <button class="filter-btn" data-category="healthy">Healthy Options</button>
            <button class="filter-btn" data-category="coffee">Coffee & Tea</button>
            <button class="filter-btn" data-category="ice-cream">Ice Cream</button>
        </div>

        <!-- Directory Grid -->
        <div class="directory-grid" id="vendorGrid">
            <!-- Vendors will be loaded here -->
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination">
            <!-- Pagination will be generated here -->
        </div>
    </div>

    <script>
        let currentVendors = [];
        let filteredVendors = [];
        let currentPage = 1;
        const vendorsPerPage = 12;

        document.addEventListener('DOMContentLoaded', function() {
            loadVendors();
            setupEventListeners();
        });

        function setupEventListeners() {
            // Search form
            document.getElementById('searchForm').addEventListener('submit', function(e) {
                e.preventDefault();
                filterVendors();
            });

            // Category filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    filterVendors();
                });
            });
        }

        function loadVendors() {
            // Load vendors from localStorage or API
            const vendors = JSON.parse(localStorage.getItem('vendingVendors') || '[]');
            
            if (vendors.length === 0) {
                // Add some sample data for demonstration
                const sampleVendors = [
                    {
                        id: 1,
                        name: "SnackMaster Vending",
                        category: "snacks",
                        location: "New York",
                        description: "Premium snack vending machines with healthy options",
                        phone: "(555) 123-4567",
                        email: "info@snackmaster.com",
                        website: "https://snackmaster.com"
                    },
                    {
                        id: 2,
                        name: "Beverage Express",
                        category: "beverages",
                        location: "Los Angeles",
                        description: "Cold beverages and energy drinks",
                        phone: "(555) 234-5678",
                        email: "contact@beverageexpress.com",
                        website: "https://beverageexpress.com"
                    },
                    {
                        id: 3,
                        name: "Healthy Bites",
                        category: "healthy",
                        location: "Chicago",
                        description: "Organic and healthy vending options",
                        phone: "(555) 345-6789",
                        email: "hello@healthybites.com",
                        website: "https://healthybites.com"
                    }
                ];
                
                localStorage.setItem('vendingVendors', JSON.stringify(sampleVendors));
                currentVendors = sampleVendors;
            } else {
                currentVendors = vendors;
            }
            
            filteredVendors = [...currentVendors];
            displayVendors();
        }

        function filterVendors() {
            const searchQuery = document.getElementById('searchQuery').value.toLowerCase();
            const locationFilter = document.getElementById('locationFilter').value;
            const activeCategory = document.querySelector('.filter-btn.active').dataset.category;
            
            filteredVendors = currentVendors.filter(vendor => {
                const matchesSearch = vendor.name.toLowerCase().includes(searchQuery) ||
                                    vendor.description.toLowerCase().includes(searchQuery);
                const matchesLocation = !locationFilter || vendor.location.toLowerCase() === locationFilter;
                const matchesCategory = activeCategory === 'all' || vendor.category === activeCategory;
                
                return matchesSearch && matchesLocation && matchesCategory;
            });
            
            currentPage = 1;
            displayVendors();
        }

        function displayVendors() {
            const grid = document.getElementById('vendorGrid');
            const startIndex = (currentPage - 1) * vendorsPerPage;
            const endIndex = startIndex + vendorsPerPage;
            const vendorsToShow = filteredVendors.slice(startIndex, endIndex);
            
            if (vendorsToShow.length === 0) {
                grid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search" style="font-size: 3rem; color: #ccc; margin-bottom: 1rem;"></i>
                        <h3>No vendors found</h3>
                        <p>Try adjusting your search criteria or browse all categories</p>
                    </div>
                `;
            } else {
                grid.innerHTML = vendorsToShow.map(vendor => `
                    <div class="vendor-card">
                        <div class="vendor-image">
                            <i class="fas fa-store"></i>
                        </div>
                        <div class="vendor-content">
                            <div class="vendor-name">${vendor.name}</div>
                            <div class="vendor-category">${vendor.category.charAt(0).toUpperCase() + vendor.category.slice(1)}</div>
                            <div class="vendor-location">
                                <i class="fas fa-map-marker-alt"></i> ${vendor.location}
                            </div>
                            <div class="vendor-description">${vendor.description}</div>
                            <div class="vendor-contact">
                                <div class="contact-item">
                                    <i class="fas fa-phone"></i> ${vendor.phone}
                                </div>
                                <div class="contact-item">
                                    <i class="fas fa-envelope"></i> ${vendor.email}
                                </div>
                            </div>
                            <a href="vendor/${vendor.id}/" class="btn-view">View Details</a>
                        </div>
                    </div>
                `).join('');
            }
            
            displayPagination();
        }

        function displayPagination() {
            const totalPages = Math.ceil(filteredVendors.length / vendorsPerPage);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let paginationHTML = '';
            
            // Previous button
            if (currentPage > 1) {
                paginationHTML += `<button class="page-btn" onclick="goToPage(${currentPage - 1})">Previous</button>`;
            }
            
            // Page numbers
            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    paginationHTML += `<button class="page-btn active">${i}</button>`;
                } else {
                    paginationHTML += `<button class="page-btn" onclick="goToPage(${i})">${i}</button>`;
                }
            }
            
            // Next button
            if (currentPage < totalPages) {
                paginationHTML += `<button class="page-btn" onclick="goToPage(${currentPage + 1})">Next</button>`;
            }
            
            pagination.innerHTML = paginationHTML;
        }

        function goToPage(page) {
            currentPage = page;
            displayVendors();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
