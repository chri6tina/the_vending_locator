<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Test - The Vending Locator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Contentful SDK -->
    <script src="https://cdn.jsdelivr.net/npm/contentful@latest/dist/contentful.browser.min.js"></script>
</head>
<body>
    <div class="container" style="padding-top: 100px;">
        <h1>Blog Routing Test</h1>
        <div id="debug-info">
            <p><strong>Current URL:</strong> <span id="current-url"></span></p>
            <p><strong>Path:</strong> <span id="current-path"></span></p>
            <p><strong>Slug:</strong> <span id="extracted-slug"></span></p>
            <p><strong>Contentful SDK Loaded:</strong> <span id="contentful-status"></span></p>
        </div>
        
        <div id="test-results">
            <h2>Test Results</h2>
            <div id="contentful-test"></div>
        </div>
    </div>

    <script>
        // Debug information
        document.getElementById('current-url').textContent = window.location.href;
        document.getElementById('current-path').textContent = window.location.pathname;
        
        const path = window.location.pathname;
        const slug = path.split('/blog/')[1];
        document.getElementById('extracted-slug').textContent = slug || 'No slug found';
        
        document.getElementById('contentful-status').textContent = typeof contentful !== 'undefined' ? 'Yes' : 'No';
        
        // Test Contentful connection
        if (typeof contentful !== 'undefined') {
            const client = contentful.createClient({
                space: 'xpopyri6s8gv',
                accessToken: 'as1yT7ZCd27_ByA_MBu0lzJDQZVWmxafx2mfM-c9ooY',
                environment: 'master'
            });
            
            client.getEntries({
                content_type: 'blogPost',
                limit: 1
            }).then(response => {
                document.getElementById('contentful-test').innerHTML = `
                    <p><strong>Contentful Connection:</strong> Success</p>
                    <p><strong>Posts Found:</strong> ${response.items.length}</p>
                    ${response.items.length > 0 ? `<p><strong>First Post Title:</strong> ${response.items[0].fields.title}</p>` : ''}
                `;
            }).catch(error => {
                document.getElementById('contentful-test').innerHTML = `
                    <p><strong>Contentful Connection:</strong> Failed</p>
                    <p><strong>Error:</strong> ${error.message}</p>
                `;
            });
        } else {
            document.getElementById('contentful-test').innerHTML = '<p><strong>Contentful Connection:</strong> SDK not loaded</p>';
        }
    </script>
</body>
</html>
