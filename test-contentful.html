<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contentful Test</title>
    <script src="https://cdn.jsdelivr.net/npm/contentful@latest/dist/contentful.browser.min.js"></script>
</head>
<body>
    <h1>Contentful Content Types Test</h1>
    <div id="results"></div>

    <script src="contentful-config.js"></script>
    <script>
        async function testContentful() {
            try {
                const client = contentful.createClient({
                    space: CONTENTFUL_CONFIG.spaceId,
                    accessToken: CONTENTFUL_CONFIG.accessToken,
                    environment: CONTENTFUL_CONFIG.environment
                });

                console.log('Testing Contentful connection...');
                
                // Get all content types
                const contentTypes = await client.getContentTypes();
                console.log('Available content types:', contentTypes);
                
                document.getElementById('results').innerHTML = `
                    <h2>Available Content Types:</h2>
                    <ul>
                        ${contentTypes.items.map(type => `
                            <li><strong>${type.name}</strong> (ID: ${type.sys.id})</li>
                        `).join('')}
                    </ul>
                    
                    <h2>Raw Response:</h2>
                    <pre>${JSON.stringify(contentTypes, null, 2)}</pre>
                `;

                // Try to get entries for each content type
                for (const contentType of contentTypes.items) {
                    try {
                        console.log(`Trying to get entries for ${contentType.name} (${contentType.sys.id})`);
                        const entries = await client.getEntries({
                            content_type: contentType.sys.id,
                            limit: 1
                        });
                        console.log(`Entries for ${contentType.name}:`, entries);
                    } catch (error) {
                        console.error(`Error getting entries for ${contentType.name}:`, error);
                    }
                }

                // Try common content type names
                const commonNames = ['blogPost', 'post', 'blog', 'content', 'article', 'blogPost', 'Blog Post'];
                for (const name of commonNames) {
                    try {
                        console.log(`Trying content type: ${name}`);
                        const entries = await client.getEntries({
                            content_type: name,
                            limit: 1
                        });
                        console.log(`Found entries for ${name}:`, entries);
                        if (entries.items.length > 0) {
                            document.getElementById('results').innerHTML += `
                                <h3>Found content type: ${name}</h3>
                                <p>This content type exists and has entries!</p>
                            `;
                        }
                    } catch (error) {
                        console.log(`Content type ${name} not found or error:`, error.message);
                    }
                }

            } catch (error) {
                console.error('Error testing Contentful:', error);
                document.getElementById('results').innerHTML = `
                    <h2>Error:</h2>
                    <p>${error.message}</p>
                    <pre>${JSON.stringify(error, null, 2)}</pre>
                `;
            }
        }

        testContentful();
    </script>
</body>
</html>
