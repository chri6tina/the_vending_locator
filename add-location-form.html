<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Location - AI SEO Generator</title>
    <link rel="stylesheet" href="/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .form-section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }
        
        .form-section h3 {
            margin-bottom: 1rem;
            color: #374151;
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #374151;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .character-counter {
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        
        .character-counter.text-success {
            color: #059669;
        }
        
        .character-counter.text-danger {
            color: #dc2626;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2563eb;
        }
        
        .btn-secondary {
            background: #6b7280;
            color: white;
            margin-bottom: 1rem;
        }
        
        .btn-secondary:hover {
            background: #4b5563;
        }
        
        .btn-secondary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        
        .ai-message {
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1rem;
        }
        
        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }
        
        .alert-danger {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        
        .alert-info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1><i class="fas fa-map-marker-alt"></i> Add New Location</h1>
        <p class="text-muted">AI will automatically generate SEO fields based on the city and state data.</p>
        
        <form id="locationForm" data-location-form>
            <!-- Location Information -->
            <div class="form-section">
                <h3><i class="fas fa-info-circle"></i> Location Information</h3>
                
                <div class="form-group">
                    <label for="city">City *</label>
                    <input type="text" id="city" name="city" required placeholder="e.g., New York">
                </div>
                
                <div class="form-group">
                    <label for="state">State *</label>
                    <input type="text" id="state" name="state" required placeholder="e.g., NY" maxlength="2">
                </div>
            </div>
            
            <!-- SEO Fields -->
            <div class="form-section seo-fields" data-seo-section>
                <h3><i class="fas fa-search"></i> SEO Fields (Auto-Generated)</h3>
                <p class="text-muted">These fields will be automatically filled by AI based on your location data.</p>
                
                <div class="form-group">
                    <label for="meta_title">Meta Title</label>
                    <input type="text" id="meta_title" name="meta_title" placeholder="Will be auto-generated">
                    <div class="character-counter meta-title-counter">0/60</div>
                </div>
                
                <div class="form-group">
                    <label for="meta_description">Meta Description</label>
                    <textarea id="meta_description" name="meta_description" rows="3" placeholder="Will be auto-generated"></textarea>
                    <div class="character-counter meta-desc-counter">0/160</div>
                </div>
                
                <div class="form-group">
                    <label for="meta_keywords">Meta Keywords</label>
                    <textarea id="meta_keywords" name="meta_keywords" rows="2" placeholder="Will be auto-generated"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="description">Location Description</label>
                    <textarea id="description" name="description" rows="3" placeholder="Will be auto-generated"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="about">About Section</label>
                    <textarea id="about" name="about" rows="3" placeholder="Will be auto-generated"></textarea>
                </div>
            </div>
            
            <!-- Submit Button -->
            <div class="form-section">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Create Location Page
                </button>
            </div>
        </form>
    </div>
    
    <!-- Load AI Scripts -->
    <script src="/ai-seo-generator.js"></script>
    <script src="/ai-location-form.js"></script>
    
    <script>
        // Character counter functionality
        document.addEventListener('DOMContentLoaded', function() {
            const metaTitleInput = document.getElementById('meta_title');
            const metaDescInput = document.getElementById('meta_description');
            
            function updateCounter(input, counterSelector) {
                const counter = document.querySelector(counterSelector);
                if (counter) {
                    const length = input.value.length;
                    const maxLength = counterSelector.includes('title') ? 60 : 160;
                    counter.textContent = `${length}/${maxLength}`;
                    counter.className = `character-counter ${length > maxLength ? 'text-danger' : 'text-success'}`;
                }
            }
            
            if (metaTitleInput) {
                metaTitleInput.addEventListener('input', () => updateCounter(metaTitleInput, '.meta-title-counter'));
            }
            
            if (metaDescInput) {
                metaDescInput.addEventListener('input', () => updateCounter(metaDescInput, '.meta-desc-counter'));
            }
        });

        // Form submission handling
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('locationForm');
            
            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    // Show loading state
                    const submitButton = form.querySelector('button[type="submit"]');
                    const originalText = submitButton.innerHTML;
                    submitButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
                    submitButton.disabled = true;
                    
                    try {
                        // Collect form data
                        const formData = new FormData(form);
                        const locationData = {
                            city: formData.get('city'),
                            state: formData.get('state'),
                            meta_title: formData.get('meta_title'),
                            meta_description: formData.get('meta_description'),
                            meta_keywords: formData.get('meta_keywords'),
                            description: formData.get('description'),
                            about: formData.get('about')
                        };
                        
                        // Validate required fields
                        if (!locationData.city || !locationData.state) {
                            throw new Error('Please fill in both City and State fields');
                        }
                        
                        // Save location data
                        const response = await fetch('/.netlify/functions/simple-save-location', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ locationData })
                        });
                        
                        const result = await response.json();
                        
                        if (!response.ok) {
                            throw new Error(result.error || 'Failed to create location page');
                        }
                        
                        // Show success message
                        showMessage('Location page created successfully!', 'success');
                        
                        // Show the generated URL if available
                        if (result.url) {
                            showUrlMessage(result.url);
                        }
                        
                        // Reset form after successful save
                        setTimeout(() => {
                            form.reset();
                            // Reset character counters
                            const counters = form.querySelectorAll('.character-counter');
                            counters.forEach(counter => {
                                counter.textContent = counter.classList.contains('meta-title-counter') ? '0/60' : '0/160';
                                counter.className = 'character-counter text-success';
                            });
                        }, 2000);
                        
                    } catch (error) {
                        console.error('Error creating location page:', error);
                        showMessage(error.message || 'Failed to create location page. Please try again.', 'error');
                    } finally {
                        // Reset button state
                        submitButton.innerHTML = originalText;
                        submitButton.disabled = false;
                    }
                });
            }
            
            function showMessage(message, type) {
                // Remove existing messages
                const existingMessage = document.querySelector('.ai-message');
                if (existingMessage) {
                    existingMessage.remove();
                }
                
                // Create new message
                const messageDiv = document.createElement('div');
                messageDiv.className = `ai-message alert alert-${type === 'success' ? 'success' : 'danger'} mt-2`;
                messageDiv.innerHTML = `
                    <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-triangle'}"></i>
                    ${message}
                `;
                
                // Insert after the form
                const formContainer = document.querySelector('.form-container');
                formContainer.appendChild(messageDiv);
                
                // Auto-remove after 5 seconds
                setTimeout(() => {
                    if (messageDiv.parentNode) {
                        messageDiv.remove();
                    }
                }, 5000);
            }

            function showUrlMessage(url) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'ai-message alert alert-info mt-2';
                messageDiv.innerHTML = `
                    <i class="fas fa-link"></i> Your location page has been created at: <a href="${url}" target="_blank">${url}</a>
                `;
                document.querySelector('.form-container').appendChild(messageDiv);
                setTimeout(() => {
                    if (messageDiv.parentNode) {
                        messageDiv.remove();
                    }
                }, 10000); // Keep the message for 10 seconds
            }
        });
    </script>
</body>
</html>
