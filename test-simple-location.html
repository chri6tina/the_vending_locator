<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Location Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .result { margin: 20px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Simple Location Creation Test</h1>
    
    <button onclick="testSimpleLocation()">Test Simple Location Creation</button>
    
    <div id="result"></div>
    
    <script>
        async function testSimpleLocation() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="result">Testing simple location creation...</div>';
            
            try {
                const testData = {
                    locationData: {
                        city: 'Jacksonville',
                        state: 'FL',
                        meta_title: 'Vending Services in Jacksonville, FL | The Vending Locator',
                        meta_description: 'Find reliable vending machine services in Jacksonville, FL. Contact us for professional vending solutions.',
                        meta_keywords: 'vending machines Jacksonville, vending services FL, snack vending Jacksonville, beverage vending FL, coffee service Jacksonville, vending machine company FL',
                        description: 'Professional vending services in Jacksonville, FL. We provide reliable snack vending, beverage vending, and coffee service throughout the Jacksonville area.',
                        about: 'We are a trusted vending services provider serving Jacksonville, FL and surrounding areas. Our team is committed to providing reliable, high-quality vending solutions for businesses of all sizes.'
                    }
                };
                
                console.log('Sending test data:', testData);
                
                const response = await fetch('/.netlify/functions/simple-save-location', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });
                
                console.log('Response status:', response.status);
                
                const result = await response.json();
                console.log('Response data:', result);
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h3>✅ Simple Location Creation Successful!</h3>
                            <p><strong>URL:</strong> ${result.url}</p>
                            <p><strong>Location ID:</strong> ${result.location.id}</p>
                            <p><strong>Slug:</strong> ${result.location.slug}</p>
                            <pre>${JSON.stringify(result, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="result error">
                            <h3>❌ Simple Location Creation Failed</h3>
                            <p><strong>Status:</strong> ${response.status}</p>
                            <p><strong>Error:</strong> ${result.error}</p>
                            <p><strong>Details:</strong> ${result.details}</p>
                            <pre>${JSON.stringify(result, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Network error:', error);
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>❌ Network Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
